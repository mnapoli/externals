name: Deploy staging

on:
    push:
        branches: ['staging']

jobs:

    deploy:
        runs-on: ubuntu-latest
        # Avoid deploying concurrently
        concurrency: deploy-staging
        timeout-minutes: 30
        steps:
            -   uses: actions/checkout@v6

            -   uses: actions/setup-node@v4
                with:
                    node-version: '22'
                    cache: 'npm'

            -   name: Setup PHP
                uses: shivammathur/setup-php@v2
                with:
                    php-version: '8.5'
                    tools: bref/cli
                    coverage: none

            -   uses: ramsey/composer-install@v4
                with:
                    composer-options: '--no-dev'

            -   run: npm ci

            -   run: npm run build

            -   run: bref deploy --env=staging
                env:
                    BREF_TOKEN: ${{ secrets.BREF_TOKEN }}

            -   name: Refresh staging DB from prod
                run: bref cli artisan --env=staging -- staging:refresh-from-prod
                env:
                    BREF_TOKEN: ${{ secrets.BREF_TOKEN }}

            -   name: Run migrations
                run: bref cli artisan --env=staging -- migrate --force
                env:
                    BREF_TOKEN: ${{ secrets.BREF_TOKEN }}
